<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal das Professoras 🎨</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <h1>🌈 Portal das Professoras 🎨</h1>
        <p>Cantinho do Planejamento e Alegria</p>
    </header>

    <main class="container">
        <section class="section-card">
            <h2>📅 Escala de Aula</h2>
            <div class="calendar-grid">
                <div class="day-box yellow">
                    <span class="day-name">Sábado</span>
                    <strong id="prof-sabado">Profª Ana</strong>
                </div>
                <div class="day-box pink">
                    <span class="day-name">Domingo</span>
                    <strong id="prof-domingo">Profª Noelma</strong>
                </div>
            </div>
        </section>

        <section class="section-card">
            <h2>📝 Meu Plano de Aula</h2>
            <textarea id="lessonPlan" placeholder="Escreva aqui o esboço da aula, versículo chave e materiais..."></textarea>
            <button class="btn-save" onclick="savePlan()">Salvar Meu Plano ✨</button>
        </section>

        <section class="section-card">
            <h2>💡 Sugestões de Hoje</h2>
            <div class="suggestions">
                <div class="sug-item">📖 <strong>História:</strong> A Arca de Noé</div>
                <div class="sug-item">🎨 <strong>Atividade:</strong> Pintura com as mãos</div>
                <div class="sug-item">🎶 <strong>Louvor:</strong> "Toc, Toc, Toc"</div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
