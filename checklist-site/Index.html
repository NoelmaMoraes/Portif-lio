<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Semanal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h1>📅 Planejamento Semanal</h1>
        
        <div class="week-grid">
            <div class="day-card" data-day="segunda">
                <h3>Segunda</h3>
                <div class="input-group">
                    <input type="text" placeholder="Tarefa...">
                    <button onclick="addTask('segunda')">+</button>
                </div>
                <ul class="task-list"></ul>
            </div>

            <div class="day-card" data-day="terca">
                <h3>Terça</h3>
                <div class="input-group">
                    <input type="text" placeholder="Tarefa...">
                    <button onclick="addTask('terca')">+</button>
                </div>
                <ul class="task-list"></ul>
            </div>

            <div class="day-card" data-day="quarta">
                <h3>Quarta</h3>
                <div class="input-group">
                    <input type="text" placeholder="Tarefa...">
                    <button onclick="addTask('quarta')">+</button>
                </div>
                <ul class="task-list"></ul>
            </div>

            <div class="day-card" data-day="quinta">
                <h3>Quinta</h3>
                <div class="input-group">
                    <input type="text" placeholder="Tarefa...">
                    <button onclick="addTask('quinta')">+</button>
                </div>
                <ul class="task-list"></ul>
            </div>

            <div class="day-card" data-day="sexta">
                <h3>Sexta</h3>
                <div class="input-group">
                    <input type="text" placeholder="Tarefa...">
                    <button onclick="addTask('sexta')">+</button>
                </div>
                <ul class="task-list"></ul>
            </div>

            <div class="day-card" data-day="sabado">
                <h3>Sábado</h3>
                <div class="input-group">
                    <input type="text" placeholder="Tarefa...">
                    <button onclick="addTask('sabado')">+</button>
                </div>
                <ul class="task-list"></ul>
            </div>

            <div class="day-card" data-day="domingo">
                <h3>Domingo</h3>
                <div class="input-group">
                    <input type="text" placeholder="Tarefa...">
                    <button onclick="addTask('domingo')">+</button>
                </div>
                <ul class="task-list"></ul>
            </div>
        </div>

        <button class="btn-reset" onclick="resetWeek()">Limpar Semana Inteira</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
